<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#F58220"/>
<title>GDO Club — Granja del Oeste</title>
<!-- Preconexión para acelerar Firebase/Google -->
<link rel="preconnect" href="https://www.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{ --naranja:#F58220; --tinta:#1a1a1a; --gris:#5b6470; --linea:#e6e8eb; --ok:#1e8449; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
        background:#f4f5f7; color:var(--tinta); -webkit-font-smoothing:antialiased; }
  .hdr{ background:#111; color:#fff; padding:14px 16px; position:sticky; top:0; z-index:10; border-bottom:3px solid var(--naranja); }
  .hn{ max-width:680px; margin:0 auto; display:flex; align-items:center; gap:12px; }
  .hn .logo{ height:32px; width:auto; display:block; }
  .hn b{ font-size:18px; letter-spacing:.5px; }
  .hn .pts{ margin-left:auto; font-size:13px; background:var(--naranja); color:#111; padding:5px 11px; border-radius:20px; font-weight:800; }
  .wrap{ max-width:680px; margin:0 auto; padding:16px; }
  .card{ background:#fff; border:1px solid var(--linea); border-radius:14px; padding:18px; margin:14px 0; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  h1{ font-size:23px; line-height:1.25; margin-bottom:6px; }
  h2{ font-size:16px; margin:0 0 10px; }
  p{ line-height:1.5; }
  .muted{ color:var(--gris); } .small{ font-size:13px; }
  .hero{ background:#111; color:#fff; border:0; border-top:4px solid var(--naranja); }
  .hero h1{ font-size:26px; } .hero p{ color:#d6d9dd; margin-top:6px; }
  .hero .marca{ color:var(--naranja); }
  /* Tarjeta de socio virtual — logo grande centrado entre GDO CLUB y SOCIO N° */
  .carnet{ position:relative; overflow:hidden; aspect-ratio:1.58/1; max-width:400px; margin:0 auto;
           background:linear-gradient(135deg,#26262b 0%,#0a0a0b 60%); color:#fff; border:1px solid #2c2c31;
           border-radius:18px; padding:18px 22px; display:flex; flex-direction:row;
           box-shadow:0 12px 30px rgba(0,0,0,.45); }
  .carnet::before{ content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--naranja); z-index:3; }
  .ct-left{ flex:1; min-width:0; display:flex; flex-direction:column; position:relative; z-index:1; }
  /* GDO CLUB + logo en un bloque: el logo se centra BAJO el texto GDO CLUB (no la tarjeta) */
  .ct-brand{ flex:1; align-self:flex-start; display:flex; flex-direction:column; align-items:center; }
  .ct-club{ font-weight:900; letter-spacing:3px; font-size:19px; text-shadow:0 0 10px rgba(245,130,32,.85), 0 0 22px rgba(245,130,32,.5); }
  .ct-club .o{ color:var(--naranja); }
  .ct-logo{ flex:1; display:flex; align-items:center; }
  .ct-logo img{ height:90px; width:auto; display:block; filter:drop-shadow(0 0 10px rgba(245,130,32,.85)) drop-shadow(0 0 22px rgba(245,130,32,.5)); }
  .ct-nro{ font-size:10px; color:#9aa1aa; letter-spacing:2px; }
  .ct-nro b{ display:block; font-size:20px; color:var(--naranja); letter-spacing:1.5px; font-weight:900; line-height:1; }
  .ct-name{ font-size:14px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; margin-top:5px; }
  .ct-since{ font-size:8px; color:#9aa1aa; letter-spacing:1px; margin-top:5px; }
  .ct-right{ display:flex; flex-direction:column; align-items:flex-end; justify-content:space-between; position:relative; z-index:1; padding-left:8px; }
  .ct-tag{ font-size:9px; letter-spacing:2px; color:var(--naranja); border:1px solid var(--naranja); padding:3px 9px; border-radius:20px; font-weight:700; }
  .ct-pts{ text-align:right; } .ct-pts b{ display:block; font-size:20px; color:var(--naranja); font-weight:900; line-height:1; }
  .ct-pts span{ font-size:8px; color:#9aa1aa; letter-spacing:1.5px; }
  .saludo{ text-align:center; color:var(--gris); margin:4px 0 12px; }
  .btn{ display:inline-block; width:100%; background:var(--naranja); color:#fff; border:0; border-radius:10px;
        padding:13px; font-size:15px; font-weight:700; cursor:pointer; text-align:center; }
  .btn:disabled{ opacity:.5; cursor:default; }
  .btn-2{ background:#fff; color:var(--naranja); border:2px solid var(--naranja); }
  .btn-g{ background:none; color:var(--gris); border:0; font-weight:600; cursor:pointer; padding:8px; width:auto; }
  label{ display:block; font-size:13px; color:var(--gris); margin:10px 0 4px; font-weight:600; }
  input{ width:100%; padding:12px; border:1px solid #cfd4da; border-radius:10px; font-size:15px; }
  input:focus{ outline:0; border-color:var(--naranja); }
  .pts-big{ font-size:42px; font-weight:900; color:var(--naranja); line-height:1; }
  .premio{ display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--linea); }
  .premio:last-child{ border-bottom:0; }
  .premio .ico{ font-size:26px; }
  .premio .info{ flex:1; } .premio .info b{ display:block; }
  .premio .costo{ font-size:12px; color:var(--gris); }
  .premio button{ background:var(--naranja); color:#fff; border:0; border-radius:8px; padding:8px 14px; font-weight:700; cursor:pointer; font-size:13px; white-space:nowrap; }
  .premio button:disabled{ background:#cfd4da; cursor:default; }
  /* ── Premios estilo tarjeta + barra de progreso (look fidelización premium) ── */
  .sec-t{ display:flex; align-items:center; gap:8px; font-size:16px; margin:0 0 12px; font-weight:800; }
  .sec-t::before{ content:''; width:4px; height:18px; background:var(--naranja); border-radius:3px; }
  .prm{ background:#fff; border:1px solid var(--linea); border-radius:14px; padding:13px; margin-bottom:10px; transition:transform .12s, box-shadow .15s; }
  .prm:last-child{ margin-bottom:0; }
  .prm.on{ border-color:#f3cda0; box-shadow:0 5px 16px rgba(245,130,32,.13); }
  .prm:active{ transform:scale(.99); }
  .prm-top{ display:flex; align-items:center; gap:12px; }
  .prm-ico{ font-size:28px; width:50px; height:50px; display:flex; align-items:center; justify-content:center; background:#faf2e9; border-radius:12px; flex-shrink:0; }
  .prm-info{ flex:1; min-width:0; }
  .prm-info b{ display:block; font-size:15px; line-height:1.25; }
  .prm-cost{ font-size:12px; color:var(--naranja); font-weight:800; letter-spacing:.2px; }
  .prm-btn{ background:var(--naranja); color:#fff; border:0; border-radius:10px; padding:10px 16px; font-weight:800; cursor:pointer; font-size:13px; white-space:nowrap; box-shadow:0 2px 8px rgba(245,130,32,.35); }
  .prm-falta{ font-size:11px; color:var(--gris); white-space:nowrap; text-align:right; font-weight:700; line-height:1.3; }
  .pbar{ height:6px; background:#eef0f2; border-radius:6px; margin-top:11px; overflow:hidden; }
  .pbar i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#F9A24A,#F58220); border-radius:6px; transition:width .5s ease; }
  .prm.on .pbar i{ background:linear-gradient(90deg,#2bbd6e,#1e8449); }
  .vid{ position:relative; padding-top:56.25%; border-radius:12px; overflow:hidden; margin:10px 0; background:#000; }
  .vid iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; }
  .err{ background:#fdecea; color:#b93a2b; border-radius:8px; padding:10px; font-size:13px; margin:8px 0; }
  .ok{ background:#eafaf1; color:var(--ok); border-radius:8px; padding:10px; font-size:13px; margin:8px 0; }
  .chip{ display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:#eef0f2; color:var(--gris); }
  .foot{ text-align:center; font-size:11px; color:#9aa1aa; padding:18px 10px 28px; }
  .tabs{ display:flex; gap:8px; margin-bottom:10px; }
  .tabs button{ flex:1; background:#eef0f2; border:0; border-radius:8px; padding:9px; font-weight:700; color:var(--gris); cursor:pointer; }
  .tabs button.on{ background:var(--naranja); color:#fff; }
  a.volver{ color:var(--naranja); font-weight:700; text-decoration:none; }
</style>
</head>
<body>
<header class="hdr">
  <div class="hn">
    <img class="logo" src="assets/isotipo-blanco.svg" alt="Granja del Oeste"/>
    <b>GDO CLUB</b>
    <span class="pts" id="hdrPts" style="display:none"></span>
  </div>
</header>

<div class="wrap" id="app"><div class="card">Cargando…</div></div>
<div class="foot">Propiedad de Granja del Oeste<sup style="font-size:8px">®</sup> · GDO Club · v0 (en pruebas)</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function () {
  // ── Config Firebase (mismo proyecto que la tienda) ──
  var cfg = {
    apiKey: 'AIzaSyDljWSSEDrZylMxgYCPaqaqU2x-3QYvZaM',
    authDomain: 'ruteogdo.firebaseapp.com',
    projectId: 'ruteogdo',
    storageBucket: 'ruteogdo.firebasestorage.app',
    messagingSenderId: '507253098011',
    appId: '1:507253098011:web:785699004cd41dfe1f9abe',
  };
  var app = document.getElementById('app');
  if (typeof firebase === 'undefined' || !firebase.initializeApp) {
    app.innerHTML = '<div class="card err">No hay conexión. Probá de nuevo con internet.</div>'; return;
  }
  firebase.initializeApp(cfg);
  // App Check (reCAPTCHA v3 invisible) — obligatorio: Firestore/Auth exigen token.
  try { if (firebase.appCheck) firebase.appCheck().activate('6LcFdCctAAAAAELE8bLAVjrYLFgVFHH_JO0oKOxw', true); } catch (e) {}
  var auth = firebase.auth(), db = firebase.firestore();

  // ── Videos promocionales (TODO: editables desde el admin) ──
  // Reemplazar por los embeds reales de YouTube. Por ahora, placeholder.
  var VIDEOS = [
    // 'https://www.youtube.com/embed/XXXXXXXXXXX'
  ];

  // Premios de EJEMPLO para la vista pública (incentivo). El catálogo real sale
  // de Firestore cuando el socio entra.
  var EJEMPLOS = [
    { ico:'🍔', nombre:'1 kg de hamburguesas de pollo', costo:500000 },
    { ico:'🥩', nombre:'2 kg de milanesa', costo:750000 },
  ];

  var esc = function (s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); };
  var fmt = function (n){ return Number(n||0).toLocaleString('es-AR'); };

  var unsub = null;
  var lastSocio = {};   // últimos datos del socio (para armar el voucher)

  // ¿Entró escaneando el QR del mostrador? (club.html?local) → check-in.
  var enLocal = false;
  try { enLocal = new URLSearchParams(location.search).has('local'); }
  catch (e) { enLocal = /[?&]local(=|&|$)/.test(location.search); }

  // ACCESO ANTICIPADO: link privado (con clave en la URL) para que el dueño deje
  // entrar a socios elegidos aunque el club esté apagado para el público.
  // Uso: club.html?acceso=gdo2026
  var accesoAnticipado = (function () {
    try { return new URLSearchParams(location.search).get('acceso') === 'gdo2026'; }
    catch (e) { return /[?&]acceso=gdo2026(&|$)/.test(location.search); }
  })();

  // ¿El club está activo? (doc club_config/flags {activo}, lo prende el personal)
  // Si no hay doc o falla la lectura → tratamos como DESACTIVADO (no publicar a medias).
  function checkClubActivo(cb) {
    db.collection('club_config').doc('flags').get()
      .then(function (d) { cb(d.exists && d.data().activo === true); })
      .catch(function () { cb(false); });
  }
  function vistaProximamente() {
    app.innerHTML = '<div class="card" style="text-align:center;padding:34px 22px">' +
      '<div style="font-size:48px">🐔</div>' +
      '<h2 style="margin:12px 0 8px">GDO CLUB</h2>' +
      '<p style="color:#555;line-height:1.5;margin:0">¡Muy pronto! Estamos terminando de preparar nuestro programa de socios. Volvé en unos días.</p>' +
      '</div>';
  }

  auth.onAuthStateChanged(function (user) {
    if (unsub) { unsub(); unsub = null; }
    if (!user) { auth.signInAnonymously().catch(function () { vistaProximamente(); }); return; } // sin sesión: anónimo para leer el flag
    checkClubActivo(function (activo) {
      if (!activo && !accesoAnticipado) { vistaProximamente(); return; }   // apagado y sin clave → no mostrar
      if (user.isAnonymous) { vistaPublica(); return; }
      if (enLocal) checkInLocal(user);
      else entrarSocio(user);
    });
  });

  // ───────────────── VISTA PÚBLICA (no logueado) ─────────────────
  function vistaPublica(){
    document.getElementById('hdrPts').style.display = 'none';
    var vids = VIDEOS.length
      ? VIDEOS.map(function(u){ return '<div class="vid"><iframe src="'+esc(u)+'" allowfullscreen></iframe></div>'; }).join('')
      : '<p class="muted small">📹 Acá van a ir los videos del Club (los cargás vos desde el panel).</p>';
    var ej = EJEMPLOS.map(function(p){
      return '<div class="premio"><span class="ico">'+p.ico+'</span><div class="info"><b>'+esc(p.nombre)+'</b><span class="costo">'+fmt(p.costo)+' Puntos GDO</span></div></div>';
    }).join('');
    var avisoLocal = enLocal
      ? '<div class="card ok" style="text-align:center;margin-top:14px">📍 <b>Estás en el local.</b> Iniciá sesión o asociate para sumar los Puntos GDO de tu compra.</div>'
      : '';
    app.innerHTML =
      '<div class="card hero"><h1>Hacete socio de <span class="marca">GDO CLUB</span></h1>'+
        '<p>Obtené beneficios y descuentos con tus compras. Por cada <b>$1</b> que gastás sumás <b>1 Punto GDO</b>, y los canjeás por premios. 🎁</p></div>'+
      avisoLocal+
      '<div class="card">'+
        '<div class="tabs"><button id="tLogin" class="on" type="button">Ya soy socio</button><button id="tReg" type="button">Quiero asociarme</button></div>'+
        '<div id="formBox"></div>'+
      '</div>'+
      '<div class="card"><h2>📹 Mirá de qué se trata</h2>'+vids+'</div>'+
      '<div class="card"><h2>🎁 Ejemplos de premios</h2>'+ej+
        '<p class="muted small" style="margin-top:8px">* Los premios y los puntos se actualizan desde el panel. Asociate para ver el catálogo completo.</p></div>'+
      '<div class="card" style="text-align:center"><a class="volver" href="index.html">← Volver a la lista de precios</a></div>';
    document.getElementById('tLogin').onclick = function(){ setTab('login'); };
    document.getElementById('tReg').onclick = function(){ setTab('reg'); };
    setTab('login');
  }

  function setTab(which){
    var tL=document.getElementById('tLogin'), tR=document.getElementById('tReg'), box=document.getElementById('formBox');
    if(!box) return;
    tL.className = which==='login'?'on':''; tR.className = which==='reg'?'on':'';
    if (which==='login'){
      box.innerHTML =
        '<div id="msg"></div>'+
        '<label>Email</label><input id="email" type="email" autocomplete="email" placeholder="tucorreo@ejemplo.com"/>'+
        '<label>Contraseña</label><input id="pass" type="password" autocomplete="current-password" placeholder="••••••••"/>'+
        '<div style="height:12px"></div><button class="btn" id="goLogin" type="button">Entrar</button>'+
        '<div style="text-align:center;margin-top:6px"><button class="btn-g" id="goReset" type="button">Olvidé mi contraseña</button></div>';
      document.getElementById('goLogin').onclick = doLogin;
      document.getElementById('goReset').onclick = doReset;
    } else {
      box.innerHTML =
        '<div id="msg"></div>'+
        '<label>Nombre y apellido *</label><input id="nombre" type="text" autocomplete="name" placeholder="Ej: Matías Pérez"/>'+
        '<label>DNI *</label><input id="dni" type="text" inputmode="numeric" autocomplete="off" placeholder="Ej: 30123456"/>'+
        '<label>Dirección *</label><input id="direccion" type="text" autocomplete="street-address" placeholder="Calle, número, localidad"/>'+
        '<label>Teléfono / WhatsApp *</label><input id="telefono" type="tel" inputmode="tel" autocomplete="tel" placeholder="Ej: 11 1234-5678"/>'+
        '<label>Email *</label><input id="email" type="email" autocomplete="email" placeholder="tucorreo@ejemplo.com"/>'+
        '<label>Contraseña (mín. 6) *</label><input id="pass" type="password" autocomplete="new-password" placeholder="Creá una contraseña"/>'+
        '<div class="small muted" style="margin-top:8px">* Todos los datos son obligatorios.</div>'+
        '<div style="height:12px"></div><button class="btn" id="goReg" type="button">Crear mi cuenta de socio</button>';
      document.getElementById('goReg').onclick = doRegistro;
    }
  }

  function setMsg(html, cls){ var m=document.getElementById('msg'); if(m) m.innerHTML = html ? '<div class="'+(cls||'err')+'">'+html+'</div>' : ''; }
  function errTxt(e){
    var c = e && e.code || '';
    if (c.indexOf('email-already-in-use')>=0) return 'Ese email ya está registrado. Probá "Ya soy socio".';
    if (c.indexOf('invalid-email')>=0) return 'El email no es válido.';
    if (c.indexOf('weak-password')>=0) return 'La contraseña es muy corta (mínimo 6).';
    if (c.indexOf('wrong-password')>=0 || c.indexOf('invalid-credential')>=0) return 'Email o contraseña incorrectos.';
    if (c.indexOf('user-not-found')>=0) return 'No encontramos esa cuenta. ¿Querés asociarte?';
    if (c.indexOf('too-many-requests')>=0) return 'Demasiados intentos. Esperá un momento.';
    return 'No se pudo completar. Revisá tu conexión e intentá de nuevo.';
  }

  // Crea el perfil de socio tomando el SIGUIENTE número de socio en una
  // transacción atómica (sin duplicados). El número es cosmético; los puntos
  // arrancan en 0 (las reglas lo exigen).
  // Idempotente: si el perfil del socio YA existe (p. ej. dos cargas casi
  // simultáneas en el primer ingreso), NO lo vuelve a crear ni le cambia el N°
  // (eso evita el "permission-denied" por intentar pisar el nroSocio). Si dos
  // corren a la vez, la transacción reintenta sola y la 2ª ve el doc ya creado.
  function crearSocio(uid, datos){
    datos = datos || {};
    var cref = db.collection('club_config').doc('contador');
    var uref = db.collection('clientes').doc(uid);
    return db.runTransaction(function(tx){
      return tx.get(uref).then(function(u){
        if (u.exists) return (u.data()||{}).nroSocio || 0;   // ya es socio: no tocar
        return tx.get(cref).then(function(c){
          var n = (c.exists ? (c.data().n||0) : 0) + 1;
          if (c.exists) tx.update(cref, {n:n}); else tx.set(cref, {n:n});
          tx.set(uref, {
            nombre: datos.nombre||'', email: datos.email||'',
            dni: datos.dni||'', direccion: datos.direccion||'', telefono: datos.telefono||'',
            puntos:0, nroSocio:n, creado: firebase.firestore.FieldValue.serverTimestamp()
          });
          return n;
        });
      });
    });
  }

  function doRegistro(){
    var g=function(id){ var el=document.getElementById(id); return el?(el.value||'').trim():''; };
    var nombre=g('nombre'), dni=g('dni'), direccion=g('direccion'), telefono=g('telefono'), email=g('email');
    var pass=(document.getElementById('pass')||{}).value||'';
    var dniNum=dni.replace(/\D/g,''), telNum=telefono.replace(/\D/g,'');
    if(!nombre || nombre.indexOf(' ')<1){ setMsg('Poné tu nombre y apellido completos.'); return; }
    if(!/^\d{7,8}$/.test(dniNum)){ setMsg('Poné un DNI válido (7 u 8 números, sin puntos).'); return; }
    if(!direccion){ setMsg('Poné tu dirección.'); return; }
    if(telNum.length<8){ setMsg('Poné un teléfono válido.'); return; }
    if(!email){ setMsg('Poné tu email.'); return; }
    if(pass.length<6){ setMsg('La contraseña debe tener al menos 6 caracteres.'); return; }
    var b=document.getElementById('goReg'); b.disabled=true; b.textContent='Creando…';
    auth.createUserWithEmailAndPassword(email, pass).then(function(cred){
      return crearSocio(cred.user.uid, { nombre:nombre, email:email, dni:dniNum, direccion:direccion, telefono:telefono });
    }).catch(function(e){ setMsg(errTxt(e)); b.disabled=false; b.textContent='Crear mi cuenta de socio'; });
  }

  function doLogin(){
    var email=(document.getElementById('email').value||'').trim();
    var pass=document.getElementById('pass').value||'';
    var b=document.getElementById('goLogin'); b.disabled=true; b.textContent='Entrando…';
    auth.signInWithEmailAndPassword(email, pass).catch(function(e){ setMsg(errTxt(e)); b.disabled=false; b.textContent='Entrar'; });
  }

  function doReset(){
    var email=(document.getElementById('email').value||'').trim();
    if(!email){ setMsg('Escribí tu email arriba y toca de nuevo "Olvidé mi contraseña".'); return; }
    auth.sendPasswordResetEmail(email).then(function(){ setMsg('Te enviamos un mail para recuperar la contraseña.', 'ok'); }).catch(function(e){ setMsg(errTxt(e)); });
  }

  // ───────────────── VISTA SOCIO (logueado) ─────────────────
  var _entrando = false;
  function entrarSocio(user){
    if(_entrando) return;            // evita corridas dobles de onAuthStateChanged
    _entrando = true;
    app.innerHTML = '<div class="card">Cargando tu cuenta…</div>';
    var ref = db.collection('clientes').doc(user.uid);
    var escuchar = function(){ unsub = ref.onSnapshot(function(d){ if(d.exists) renderSocio(user, d.data()||{}); }, function(){ /* permiso/red */ }); };
    var fallar = function(){
      app.innerHTML = '<div class="card err">No pudimos cargar tu cuenta. Probá recargar.</div>'+
        '<div class="card" style="text-align:center"><button class="btn-2 btn" id="out" type="button">Cerrar sesión</button></div>';
      var o=document.getElementById('out'); if(o) o.onclick=function(){ auth.signOut(); };
    };
    ref.get().then(function(doc){
      if(!doc.exists){
        return crearSocio(user.uid, { nombre: user.displayName || (user.email||'').split('@')[0], email: user.email||'' });
      }
    }).then(function(){
      _entrando = false; escuchar();
    }).catch(function(){
      // Carrera del primer ingreso: si el perfil EN REALIDAD quedó creado, no es
      // error → escuchamos igual. Solo mostramos error si de verdad no existe.
      ref.get().then(function(d2){
        _entrando = false;
        if(d2.exists) escuchar(); else fallar();
      }).catch(function(){ _entrando = false; fallar(); });
    });
  }

  // ───────────────── CHECK-IN EN EL MOSTRADOR (QR) ─────────────────
  // El socio escaneó el QR único. Registramos su visita (sin puntos: los carga
  // el cajero) y le mostramos la credencial para que la muestre en la caja.
  function checkInLocal(user){
    app.innerHTML = '<div class="card">📍 Registrando tu visita…</div>';
    var ref = db.collection('clientes').doc(user.uid);
    ref.get().then(function(doc){
      if(!doc.exists){
        return crearSocio(user.uid, { nombre: user.displayName || (user.email||'').split('@')[0], email: user.email||'' })
          .then(function(){ return ref.get(); });
      }
      return doc;
    }).then(function(doc){
      var socio = (doc && doc.data && doc.data()) || {};
      return db.collection('visitas').doc(user.uid).set({
        clienteUid: user.uid,
        nombre: socio.nombre || (user.email||'').split('@')[0] || 'Socio',
        nroSocio: socio.nroSocio || 0,
        estado: 'pendiente',
        ts: firebase.firestore.FieldValue.serverTimestamp()
      }).then(function(){ return socio; });
    }).then(function(socio){
      renderCheckIn(user, socio);
    }).catch(function(){
      app.innerHTML = '<div class="card err">No pudimos registrar tu visita. Revisá tu conexión y volvé a escanear el código del mostrador.</div>'+
        '<div class="card" style="text-align:center"><button class="btn btn-2" id="reint" type="button">Reintentar</button></div>';
      var r=document.getElementById('reint'); if(r) r.onclick=function(){ checkInLocal(user); };
    });
  }

  function renderCheckIn(user, socio){
    document.getElementById('hdrPts').style.display='none';
    app.innerHTML =
      '<div class="card hero" style="text-align:center">'+
        '<div style="font-size:52px;line-height:1">✅</div>'+
        '<h1 style="margin-top:6px">¡Estás en el local!</h1>'+
        '<p>Mostrale esta pantalla al cajero. Te va a cargar los <b class="marca">Puntos GDO</b> de tu compra. 🛒</p></div>'+
      carnetHTML(socio)+'<div style="height:14px"></div>'+
      '<div class="card" style="text-align:center">'+
        '<button class="btn" id="verCuenta" type="button">Ver mi cuenta y premios</button>'+
        '<div style="height:10px"></div>'+
        '<button class="btn-g" id="out" type="button">Cerrar sesión</button>'+
      '</div>';
    document.getElementById('verCuenta').onclick = function(){
      enLocal = false;
      try { history.replaceState({}, '', 'club.html'); } catch (e) {}
      entrarSocio(user);
    };
    document.getElementById('out').onclick = function(){ auth.signOut(); };
  }

  // Tarjeta de socio (la usan la vista de cuenta y la confirmación de check-in).
  function carnetHTML(socio){
    var pts = socio.puntos||0;
    var nom = (socio.nombre||'').split(' ')[0] || 'socio';
    var _p = ('00000000' + (socio.nroSocio||0)).slice(-8);
    var nroFmt = _p.slice(0,4) + ' ' + _p.slice(4);
    var fechaIngreso = '—';
    try { if (socio.creado && socio.creado.toDate) { var _d = socio.creado.toDate(); fechaIngreso = ('0'+(_d.getMonth()+1)).slice(-2) + '/' + _d.getFullYear(); } } catch (e) {}
    return '<div class="carnet">'+
        '<div class="ct-left">'+
          '<div class="ct-brand">'+
            '<span class="ct-club">GDO <span class="o">CLUB</span></span>'+
            '<div class="ct-logo"><img src="assets/isotipo-blanco.svg" alt="GDO"/></div>'+
          '</div>'+
          '<div class="ct-data">'+
            '<div class="ct-nro">SOCIO N°<b>'+nroFmt+'</b></div>'+
            '<div class="ct-name">'+esc(socio.nombre||nom)+'</div>'+
            '<div class="ct-since">SOCIO DESDE '+fechaIngreso+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="ct-right">'+
          '<span class="ct-tag">MIEMBRO</span>'+
          '<div class="ct-pts"><b>'+fmt(pts)+'</b><span>PUNTOS GDO</span></div>'+
        '</div>'+
      '</div>';
  }

  function renderSocio(user, socio){
    lastSocio = socio || {};
    var pts = socio.puntos||0;
    var nom = (socio.nombre||'').split(' ')[0] || 'socio';
    document.getElementById('hdrPts').style.display='inline-block';
    document.getElementById('hdrPts').textContent = fmt(pts)+' pts';
    app.innerHTML =
      '<p class="saludo">¡Hola '+esc(nom)+'! 👋 Esta es tu credencial de socio:</p>'+
      carnetHTML(socio)+'<div style="height:14px"></div>'+
      '<div class="card"><h2 class="sec-t">🎁 Premios para canjear</h2><div id="premios"><p class="muted small">Cargando premios…</p></div></div>'+
      '<div class="card"><h2 class="sec-t">🎟️ Mis canjes</h2><div id="canjes"><p class="muted small">—</p></div></div>'+
      '<div class="card" style="text-align:center"><a class="volver" href="index.html">← Ir a la lista de precios</a>'+
        '<div style="height:12px"></div><button class="btn-g" id="out" type="button">Cerrar sesión</button></div>';
    document.getElementById('out').onclick = function(){ auth.signOut(); };
    cargarPremios(user, pts);
    cargarCanjes(user);
  }

  function cargarPremios(user, pts){
    var cont = document.getElementById('premios');
    db.collection('premios').where('activo','==',true).get().then(function(snap){
      if(snap.empty){ cont.innerHTML='<p class="muted small">Todavía no hay premios cargados. ¡Pronto!</p>'; return; }
      var arr=[]; snap.forEach(function(d){ var p=d.data(); p._id=d.id; arr.push(p); });
      arr.sort(function(a,b){ return (a.costo||0)-(b.costo||0); });
      cont.innerHTML = arr.map(function(p){
        var costo = p.costo||0;
        var alcanza = pts >= costo;
        var pct = costo>0 ? Math.min(100, Math.round(pts/costo*100)) : 100;
        return '<div class="prm'+(alcanza?' on':'')+'">'+
          '<div class="prm-top">'+
            '<span class="prm-ico">'+(p.ico||'🎁')+'</span>'+
            '<div class="prm-info"><b>'+esc(p.nombre)+'</b><span class="prm-cost">'+fmt(costo)+' Puntos GDO</span></div>'+
            (alcanza
              ? '<button class="prm-btn" data-id="'+esc(p._id)+'" data-c="'+costo+'" data-n="'+esc(p.nombre)+'" data-i="'+esc(p.ico||'🎁')+'">Canjear</button>'
              : '<span class="prm-falta">Te faltan<br>'+fmt(costo-pts)+'</span>')+
          '</div>'+
          '<div class="pbar"><i style="width:'+pct+'%"></i></div>'+
        '</div>';
      }).join('');
      cont.querySelectorAll('button[data-id]').forEach(function(b){
        b.onclick = function(){ canjear(user, b.dataset.id, parseInt(b.dataset.c,10), b.dataset.n, b.dataset.i, b); };
      });
    }).catch(function(){ cont.innerHTML='<p class="muted small">No se pudieron cargar los premios.</p>'; });
  }

  // Código legible y único del voucher (12 hex de crypto → GDO-XXXX-XXXX-XXXX).
  function nuevoCodigo(){
    var a = new Uint8Array(6);
    if (window.crypto && crypto.getRandomValues) crypto.getRandomValues(a);
    else { for(var k=0;k<a.length;k++) a[k] = Math.floor(Math.random()*256); }
    var hex=''; for(var i=0;i<a.length;i++){ hex += ('0'+a[i].toString(16)).slice(-2); }
    hex = hex.toUpperCase();
    return 'GDO-'+hex.slice(0,4)+'-'+hex.slice(4,8)+'-'+hex.slice(8,12);
  }

  // CANJE AUTOMÁTICO: descuenta los puntos y emite el voucher en UNA transacción.
  // Las reglas exigen que los puntos bajen exactamente el costo (anti-estafa).
  function canjear(user, premioId, costo, nombre, ico, btn){
    if(!confirm('¿Canjear '+fmt(costo)+' Puntos GDO por "'+nombre+'"?\n\nSe descuentan al instante y te generamos un VOUCHER para presentar en el local.')) return;
    btn.disabled=true; btn.textContent='Generando…';
    var cref = db.collection('clientes').doc(user.uid);
    var vref = db.collection('canjes').doc();
    var codigo = nuevoCodigo();
    var venceMs = Date.now() + 30*24*60*60*1000;   // 30 días
    db.runTransaction(function(tx){
      return tx.get(cref).then(function(c){
        if(!c.exists) throw new Error('sin-perfil');
        var saldo = (c.data().puntos||0);
        if(saldo < costo) throw new Error('saldo');
        tx.update(cref, { puntos: saldo - costo });
        tx.set(vref, {
          clienteUid: user.uid, premioId: premioId, premioNombre: nombre, premioIco: ico||'🎁',
          costo: costo, estado: 'emitido', usado: false, codigo: codigo,
          socioNombre: (lastSocio.nombre||''), socioNro: (lastSocio.nroSocio||0),
          venceMs: venceMs, ts: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
    }).then(function(){
      voucherView({ _id: vref.id, premioNombre:nombre, premioIco:ico||'🎁', costo:costo, codigo:codigo,
        usado:false, venceMs:venceMs, socioNombre:lastSocio.nombre, socioNro:lastSocio.nroSocio });
      cargarCanjes(user);  // refresca el historial del socio al instante (antes solo se leía al entrar)
    }).catch(function(e){
      var m = (e&&e.message)||'';
      alert(m==='saldo' ? 'No te alcanzan los puntos para este premio.'
           : 'No se pudo generar el canje. Probá de nuevo en un momento.');
      btn.disabled=false; btn.textContent='Canjear';
    });
  }

  // Voucher en pantalla (overlay sobre todo, así un re-render no lo borra).
  // Escucha EN VIVO: cuando el cajero lo marca usado, la pantalla del socio
  // cambia sola a un agradecimiento.
  function voucherView(c){
    var prev=document.getElementById('voucherOverlay'); if(prev){ if(prev._unsub){try{prev._unsub();}catch(e){}} prev.remove(); }
    var venceTxt = c.venceMs ? new Date(c.venceMs).toLocaleDateString('es-AR') : '—';
    var _p = ('00000000'+(c.socioNro||0)).slice(-8); var nroFmt=_p.slice(0,4)+' '+_p.slice(4);
    var ov=document.createElement('div'); ov.id='voucherOverlay';
    ov.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto';
    document.body.appendChild(ov);

    function cerrar(){ if(ov._unsub){try{ov._unsub();}catch(e){} ov._unsub=null;} ov.remove(); }

    function pintarGracias(){
      ov.innerHTML =
        '<div style="max-width:360px;width:100%">'+
          '<div style="background:linear-gradient(135deg,#26262b,#0a0a0b 60%);color:#fff;border:1px solid #2c2c31;border-left:6px solid #1e8449;border-radius:18px;padding:28px 22px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.5)">'+
            '<div style="font-size:52px;line-height:1">🎉</div>'+
            '<div style="display:flex;align-items:center;gap:8px;justify-content:center;margin:12px 0 6px"><img src="assets/isotipo-blanco.svg" style="height:26px"/><b style="letter-spacing:2px;font-size:13px">GDO <span style="color:#F58220">CLUB</span></b></div>'+
            '<h2 style="font-size:22px;margin:8px 0 8px;color:#fff">¡Gracias por elegirnos! 🧡</h2>'+
            '<p style="color:#d6d9dd;font-size:14px;line-height:1.55">Tu voucher de <b>'+(c.premioIco||'')+' '+esc(c.premioNombre||'')+'</b> ya fue <b style="color:#48c97e">canjeado</b> con éxito.<br>¡Que lo disfrutes! 🐔</p>'+
            '<p style="color:#9aa1aa;font-size:11px;margin-top:16px">Tu fidelidad nos hace crecer.<br>— Familia <b>Granja del Oeste</b></p>'+
          '</div>'+
          '<div style="margin-top:12px"><button id="vchClose" class="btn btn-2" style="width:100%">Cerrar</button></div>'+
        '</div>';
      document.getElementById('vchClose').onclick=cerrar;
    }

    function pintarVoucher(){
      ov.innerHTML =
        '<div style="max-width:360px;width:100%">'+
          '<div style="position:relative;background:linear-gradient(135deg,#26262b,#0a0a0b 60%);color:#fff;border:1px solid #2c2c31;border-left:6px solid #F58220;border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.5)">'+
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><img src="assets/isotipo-blanco.svg" style="height:28px"/><b style="letter-spacing:2px;font-size:13px">GDO <span style="color:#F58220">CLUB</span></b><span style="margin-left:auto;font-size:8.5px;color:#9aa1aa;letter-spacing:1px">VOUCHER DE CANJE</span></div>'+
            '<div style="text-align:center;margin:4px 0 10px"><div style="font-size:34px">'+(c.premioIco||'🎁')+'</div><div style="font-weight:800;font-size:16px;margin-top:2px">'+esc(c.premioNombre||'')+'</div><div style="font-size:11px;color:#9aa1aa">'+fmt(c.costo)+' Puntos GDO</div></div>'+
            '<div id="vchQR" style="background:#fff;width:166px;height:166px;margin:0 auto;border-radius:10px;display:flex;align-items:center;justify-content:center"></div>'+
            '<div style="text-align:center;font-family:monospace;font-size:14px;letter-spacing:1px;margin-top:8px;color:#F58220;font-weight:700">'+esc(c.codigo||'')+'</div>'+
            '<div style="font-size:9.5px;color:#9aa1aa;margin-top:8px">SOCIO '+esc(c.socioNombre||'')+' · N° '+nroFmt+'</div>'+
            '<div style="font-size:9px;color:#9aa1aa;margin-top:2px">Vence: '+venceTxt+'</div>'+
            '<div style="font-size:8.5px;color:#7a808a;margin-top:8px;line-height:1.45;border-top:1px solid #2c2c31;padding-top:6px">Válido para UN ÚNICO canje en el local. Prohibida su reproducción. Sin valor comercial. El primero en escanearse anula al resto (original y copias comparten el mismo código).</div>'+
          '</div>'+
          '<div style="margin-top:12px">'+
            '<div style="font-size:11px;color:#fff;background:rgba(255,255,255,.08);border-radius:8px;padding:8px;text-align:center;margin-bottom:8px">💡 Mostralo en el local para canjearlo. Queda guardado en <b>Mis canjes</b>.</div>'+
            '<button id="vchClose" class="btn btn-2" style="width:100%">Cerrar</button>'+
          '</div>'+
        '</div>';
      try{ new QRCode(document.getElementById('vchQR'), { text:'https://rutas.granjadeloeste.com/#/v/'+c._id, width:150, height:150, correctLevel:QRCode.CorrectLevel.M }); }catch(e){}
      document.getElementById('vchClose').onclick=cerrar;
    }

    if(c.usado){ pintarGracias(); }
    else {
      pintarVoucher();
      // En vivo: cuando el cajero escanea y lo marca usado → agradecimiento.
      ov._unsub = db.collection('canjes').doc(c._id).onSnapshot(function(d){
        if(d.exists && d.data().usado){
          c.usado=true;
          if(ov._unsub){ try{ov._unsub();}catch(e){} ov._unsub=null; }
          pintarGracias();
        }
      }, function(){});
    }
    ov.onclick=function(e){ if(e.target===ov) cerrar(); };
  }

  function cargarCanjes(user){
    var cont = document.getElementById('canjes');
    db.collection('canjes').where('clienteUid','==',user.uid).get().then(function(snap){
      if(snap.empty){ cont.innerHTML='<p class="muted small">Todavía no tenés canjes. Canjeá un premio y te damos un voucher. 🎟️</p>'; return; }
      var arr=[]; snap.forEach(function(d){ var x=d.data(); x._id=d.id; arr.push(x); });
      arr.sort(function(a,b){ return ((b.ts&&b.ts.toMillis?b.ts.toMillis():0)-(a.ts&&a.ts.toMillis?a.ts.toMillis():0)); });
      cont.innerHTML = arr.map(function(c){
        var chip = c.usado ? '<span class="chip">✔ Usado</span>' : '<span class="chip" style="background:#eafaf1;color:#1e8449">✅ Vigente · ver</span>';
        return '<div class="premio" data-v="'+esc(c._id)+'" style="cursor:pointer"><span class="ico">'+(c.premioIco||'🎁')+'</span>'+
          '<div class="info"><b>'+esc(c.premioNombre||'')+'</b><span class="costo">'+esc(c.codigo||'')+'</span></div>'+chip+'</div>';
      }).join('');
      cont.querySelectorAll('[data-v]').forEach(function(el){
        el.onclick=function(){ var c=null; for(var i=0;i<arr.length;i++){ if(arr[i]._id===el.dataset.v){ c=arr[i]; break; } } if(c) voucherView(c); };
      });
    }).catch(function(){ cont.innerHTML='<p class="muted small">—</p>'; });
  }
})();
</script>
