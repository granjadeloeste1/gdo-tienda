<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Prototipo lista minorista</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{ --naranja:#F58220; --tinta:#1a1a1a; --gris:#5b6470; --linea:#e6e8eb; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:#f4f5f7; color:var(--tinta); padding-bottom:80px; overflow-x:hidden; }
  .hdr{ background:#111; color:#fff; padding:13px 16px; position:sticky; top:0; z-index:20; border-bottom:3px solid var(--naranja); display:flex; align-items:center; gap:10px; }
  .hdr b{ font-size:17px; letter-spacing:.4px } .hdr .sub{ font-size:11px; color:#bdbdbd }
  .hdr .back{ background:none; border:0; color:#fff; font-size:20px; cursor:pointer; display:none }
  .wrap{ max-width:680px; margin:0 auto; padding:16px }
  /* chooser */
  .hero-logo{ text-align:center; margin:18px 0 8px } .hero-logo img{ height:96px; width:auto }
  .choose{ display:grid; gap:14px; margin-top:8px }
  .ch{ display:flex; align-items:center; gap:16px; background:#fff; border:1px solid var(--linea); border-left:5px solid var(--naranja); border-radius:16px; padding:20px; cursor:pointer; text-align:left; box-shadow:0 2px 8px rgba(0,0,0,.05); transition:transform .12s, box-shadow .15s }
  .ch:active{ transform:scale(.99) } .ch:hover{ box-shadow:0 8px 22px rgba(245,130,32,.15) }
  .ch .ico{ font-size:40px } .ch h3{ font-size:19px; margin-bottom:3px } .ch p{ font-size:13px; color:var(--gris); line-height:1.4 }
  .ch .arr{ margin-left:auto; color:var(--naranja); font-size:24px }
  .lead{ text-align:center; color:var(--gris); font-size:14px; margin:6px 0 16px }
  /* logo header */
  .hdr .lg{ width:36px; height:36px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; box-shadow:0 0 0 2px rgba(245,130,32,.6) }
  .hdr .lg img{ width:25px; height:25px; display:block }
  /* banner rotativo */
  .banner{ position:relative; border-radius:16px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,.15); margin-bottom:12px }
  .bn-track{ display:flex; transition:transform .55s ease }
  .bn-track img{ width:100%; flex:0 0 100%; display:block; aspect-ratio:851/315; object-fit:cover }
  .bn-dots{ position:absolute; left:0; right:0; bottom:9px; display:flex; gap:6px; justify-content:center }
  .bn-dots i{ width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.55); cursor:pointer; transition:all .2s }
  .bn-dots i.on{ background:#fff; width:18px; border-radius:4px }
  .infostrip{ background:#fff7ef; border:1px solid #f3e3d0; color:#a85f1a; border-radius:10px; padding:9px 12px; font-size:12.5px; font-weight:600; text-align:center; margin-bottom:12px }
  /* search */
  .search{ width:100%; padding:12px 14px; border:1px solid #cfd4da; border-radius:12px; font-size:15px; margin-bottom:14px }
  .search:focus{ outline:0; border-color:var(--naranja) }
  /* acordeon */
  .cat{ margin-bottom:10px; border-radius:14px; overflow:hidden; border:1px solid var(--linea); background:#fff }
  .cat-h{ display:flex; align-items:center; gap:10px; width:100%; background:#fff; border:0; border-left:5px solid var(--naranja); padding:15px 14px; font-family:inherit; font-size:15px; font-weight:800; color:var(--tinta); cursor:pointer; text-align:left; letter-spacing:.3px }
  .cat-h .n{ margin-left:auto; font-size:11px; color:#9aa1aa; font-weight:600 }
  .cat-h .chev{ transition:transform .2s; color:var(--naranja) }
  .cat.open .cat-h .chev{ transform:rotate(90deg) }
  .cat-body{ display:none; padding:4px 10px 10px } .cat.open .cat-body{ display:block }
  .sub{ margin:8px 0 }
  .sub-h{ display:flex; align-items:center; gap:8px; width:100%; background:#fff7ef; border:1px solid #f3e3d0; border-radius:10px; padding:11px 12px; font-family:inherit; font-size:12.5px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:var(--naranja); cursor:pointer; text-align:left }
  .sub-h .n{ margin-left:auto; font-size:10px; color:#c08a4e; font-weight:700 }
  .sub-h .chev{ transition:transform .2s }
  .sub.open .sub-h .chev{ transform:rotate(90deg) }
  .sub-body{ display:none; padding:8px 2px 2px } .sub.open .sub-body{ display:block }
  .prod{ border:1px solid var(--linea); border-radius:12px; margin-bottom:8px; overflow:hidden }
  .prod-h{ display:flex; align-items:center; gap:12px; width:100%; background:#fff; border:0; padding:12px; cursor:pointer; text-align:left; font-family:inherit }
  .prod-h .pi{ flex:1; min-width:0 } .prod-h .pi b{ display:block; font-size:14.5px; line-height:1.25 }
  .prod-h .pi span{ font-size:12px; color:var(--gris) }
  .prod-h .desde{ text-align:right; white-space:nowrap } .prod-h .desde small{ display:block; font-size:9px; color:#9aa1aa; letter-spacing:.5px } .prod-h .desde b{ color:var(--naranja); font-size:14px }
  .prod-h .chev{ color:#c3c8ce; transition:transform .2s; margin-left:4px } .prod.open .prod-h .chev{ transform:rotate(90deg); color:var(--naranja) }
  .vars{ display:none; background:#faf7f3; padding:4px 12px 10px; border-top:1px solid var(--linea) } .prod.open .vars{ display:block }
  .var{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px dashed #e6ddd2 } .var:last-child{ border-bottom:0 }
  .var .vn{ flex:1; font-size:13.5px; font-weight:600 }
  .var .vp{ font-weight:800; color:var(--naranja); font-size:14px; white-space:nowrap }
  .var .vp .ant{ display:block; font-size:10px; color:#b0b6bd; text-decoration:line-through; font-weight:600 }
  .var .add{ background:var(--naranja); color:#fff; border:0; border-radius:9px; width:34px; height:34px; font-size:20px; font-weight:700; cursor:pointer; flex-shrink:0; box-shadow:0 2px 7px rgba(245,130,32,.35) }
  .qn{ display:inline-block; min-width:30px; text-align:center; font-weight:800; font-size:14px }
  .var.incart{ background:#fff7ef; border-radius:8px }
  .var .stp{ flex-shrink:0 }
  /* escala de ofertas: cuanto más conveniente, más grande y resaltado */
  .tiers{ display:flex; flex-direction:column; gap:7px; padding:8px 0 2px }
  .tr{ position:relative; display:flex; align-items:center; gap:8px; background:#fff; border:1px solid #e6ddd2; border-radius:10px; padding:8px 12px }
  .tr .tk{ font-weight:700; color:var(--tinta); font-size:13px }
  .tr b{ color:var(--naranja); font-weight:800; font-size:15px }
  .tr small{ margin-left:auto; color:#9aa1aa; font-size:10px; font-weight:600 }
  .tr.of1{ border-color:#f3cda0; background:#fff7ef; padding:10px 12px }
  .tr.of1 .tk{ font-size:14px } .tr.of1 b{ font-size:18px }
  .tr.of2{ background:#111; border-color:#111; padding:13px 12px 12px; box-shadow:0 4px 14px rgba(0,0,0,.25) }
  .tr.of2 .tk{ color:#fff; font-size:15px } .tr.of2 b{ color:#F58220; font-size:23px } .tr.of2 small{ color:#ffd9b3 }
  .ofb{ position:absolute; top:-9px; left:12px; background:#F58220; color:#111; font-size:9px; font-weight:900; letter-spacing:.5px; padding:2px 8px; border-radius:11px; box-shadow:0 2px 6px rgba(0,0,0,.25) }
  .var.of2{ position:relative; background:#111; border-radius:10px; padding:13px 10px 11px; margin-top:6px; border:0 }
  .var.of2 .vn{ color:#fff; font-weight:700 } .var.of2 .vp{ color:#F58220; font-size:16px }
  .kgrow{ display:flex; align-items:center; gap:9px; padding:8px 0 2px }
  .kgrow .lbl{ font-size:12.5px; color:var(--gris); font-weight:700 }
  .kgrow .ktot{ margin-left:auto; font-weight:800; color:var(--naranja); font-size:17px; min-height:20px }
  .kgsel.incart{ background:#fff7ef; border-radius:8px; padding:8px 8px 4px }
  /* stepper / selector por peso */
  .stp{ display:inline-flex; align-items:center; border:1px solid #e0c9b0; border-radius:9px; overflow:hidden; background:#fff }
  .stp button{ width:32px; height:32px; border:0; background:#fff; color:var(--naranja); font-size:18px; font-weight:800; cursor:pointer }
  .stp input{ width:46px; height:32px; border:0; text-align:center; font-size:14px; font-weight:700; -moz-appearance:textfield }
  .stp input::-webkit-outer-spin-button,.stp input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0 }
  .kgsel{ padding:8px 2px 4px }
  .kgsel .row1{ display:flex; align-items:center; gap:10px }
  .kgsel .lbl{ font-size:12.5px; color:var(--gris); font-weight:700 }
  .kgsel .pr{ margin-left:auto; font-weight:800; color:var(--naranja); font-size:17px }
  .kgsel .pr small{ display:block; font-size:9px; color:#9aa1aa; text-align:right; font-weight:600 }
  .kgsel .addbtn,.var .addbtn2{ background:var(--naranja); color:#fff; border:0; border-radius:10px; font-weight:800; cursor:pointer; box-shadow:0 2px 8px rgba(245,130,32,.35) }
  .kgsel .addbtn{ width:100%; padding:11px; font-size:14px; margin-top:9px }
  .var .addbtn2{ padding:8px 13px; font-size:12.5px; white-space:nowrap }
  /* overlay carrito */
  .cartov{ position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.5); display:flex; align-items:flex-end; justify-content:center }
  .cartsheet{ background:#fff; width:100%; max-width:680px; max-height:88vh; border-radius:18px 18px 0 0; display:flex; flex-direction:column; overflow:hidden }
  .cartsheet .csh{ display:flex; align-items:center; gap:10px; padding:14px 16px; background:#111; color:#fff }
  .cartsheet .csh img{ height:22px } .cartsheet .csh b{ font-size:16px } .cartsheet .csh .x{ margin-left:auto; background:none; border:0; font-size:24px; cursor:pointer; color:#fff }
  .cartsheet .cbody{ overflow:auto; padding:6px 16px }
  .ci{ display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(--linea) } .ci:last-child{ border-bottom:0 }
  .ci .cinfo{ flex:1; min-width:0 } .ci .cinfo b{ display:block; font-size:14px; line-height:1.2 } .ci .cinfo span{ font-size:12px; color:var(--gris) }
  .ci .cprice{ font-weight:800; color:var(--naranja); white-space:nowrap; font-size:14px; min-width:74px; text-align:right }
  .ci .rm{ background:none; border:0; color:#c0392b; font-size:17px; cursor:pointer; padding:4px }
  .cartsheet .cfoot{ border-top:1px solid var(--linea); padding:14px 16px }
  .cartsheet .tot{ display:flex; justify-content:space-between; font-size:19px; font-weight:900; margin-bottom:8px }
  .minwarn{ font-size:12.5px; color:#c0392b; text-align:center; margin-bottom:10px; font-weight:700 }
  .envio{ border-radius:10px; padding:10px; text-align:center; font-weight:800; font-size:13px; margin-bottom:10px; background:#fff7ef; color:#a85f1a; border:1px solid #f3cda0 }
  .envio.ok{ background:#eafaf1; color:#1e8449; border-color:#b6e3c6 }
  /* checkout */
  .fl{ display:block; font-size:13px; color:var(--gris); font-weight:700; margin:12px 0 5px }
  .fin{ width:100%; padding:11px; border:1px solid #cfd4da; border-radius:10px; font-size:15px; font-family:inherit; background:#fff }
  .fin:focus{ outline:0; border-color:var(--naranja) }
  .seg{ display:flex; gap:8px }
  .seg button{ flex:1; padding:11px 6px; border:1px solid #cfd4da; background:#fff; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; color:var(--gris) }
  .seg button.on{ background:var(--naranja); color:#fff; border-color:var(--naranja) }
  .dias{ display:flex; flex-wrap:wrap; gap:8px }
  .diab{ padding:9px 14px; border:1px solid #cfd4da; background:#fff; border-radius:20px; font-weight:700; font-size:13px; cursor:pointer }
  .diab.on{ background:#111; color:#fff; border-color:#111 }
  .note2{ background:#fff7ef; border:1px solid #f3cda0; color:#a85f1a; border-radius:10px; padding:10px; font-size:13px; margin-top:6px }
  .ckline{ display:flex; justify-content:space-between; font-size:14px; color:var(--gris); margin-bottom:5px }
  .okbox{ background:#fff; border-radius:18px; max-width:340px; width:calc(100% - 40px); text-align:center; padding:30px 24px; box-shadow:0 20px 50px rgba(0,0,0,.45); animation:pop .35s ease }
  .okbox .okic{ width:74px; height:74px; border-radius:50%; background:#1e8449; color:#fff; font-size:40px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px }
  .okbox h2{ margin:0 0 8px; font-size:22px; color:#111 }
  .okbox p{ margin:0 0 20px; color:#555; font-size:15px; line-height:1.45 }
  .btn-conf{ width:100%; background:#25D366; color:#fff; border:0; border-radius:11px; padding:14px; font-size:15px; font-weight:800; cursor:pointer }
  .btn-conf:disabled{ background:#cfd4da; cursor:default }
  /* barra carrito */
  .cartbar{ position:fixed; left:0; right:0; bottom:0; background:#111; border-top:2px solid var(--naranja); padding:12px 16px; display:none }
  .cartbar.show{ display:block } .cartbar .in{ max-width:680px; margin:0 auto; display:flex; align-items:center; gap:12px }
  .cartbar button{ flex:1; background:var(--naranja); color:#111; border:0; border-radius:10px; padding:13px; font-weight:800; font-size:15px; cursor:pointer }
  .cartbar .cnt{ background:#fff; color:var(--naranja); border-radius:20px; padding:2px 10px; font-weight:800; font-size:13px }
  .toast{ position:fixed; left:50%; bottom:90px; transform:translateX(-50%); background:#1e8449; color:#fff; padding:10px 16px; border-radius:10px; font-size:14px; opacity:0; transition:opacity .25s; z-index:50; pointer-events:none }
  .toast.show{ opacity:1 }
  /* aviso envio gratis ALCANZADO: verde + mas grande */
  #cbMin.free{ color:#2bd66b !important; font-size:13.5px !important; font-weight:900; letter-spacing:.2px }
  .envio.ok{ font-size:15px; padding:13px; box-shadow:0 0 0 2px #b6e3c6 inset; animation:pop .35s ease }
  @keyframes pop{ 0%{ transform:scale(.92) } 60%{ transform:scale(1.04) } 100%{ transform:scale(1) } }
  /* barra destacada de ENVIO GRATIS (naranja + negro, identidad GDO) */
  .freebar{ background:var(--naranja); color:#111; border-radius:12px; padding:11px 14px; margin-bottom:8px; text-align:center;
    font-size:15px; font-weight:700; box-shadow:0 4px 12px rgba(245,130,32,.35); display:flex; align-items:center; justify-content:center; gap:6px }
  .freebar b{ font-weight:900 } .freebar .big{ font-size:19px; background:#111; color:#fff; padding:2px 9px; border-radius:8px; margin-left:2px }
  /* boton flotante WhatsApp (con movimiento leve) */
  .wa{ position:fixed; bottom:86px; right:16px; width:54px; height:54px; background:#25D366; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(37,211,102,.45); text-decoration:none; z-index:150; animation:waBob 2.4s ease-in-out infinite }
  .wa svg{ width:29px; height:29px; fill:#fff }
  @keyframes waBob{ 0%,100%{ transform:translateY(0) } 50%{ transform:translateY(-6px) } }
  @media(prefers-reduced-motion:reduce){ .wa{ animation:none } }
  /* pie: version + propiedad */
  .gdofoot{ text-align:center; color:#9a9a9a; font-size:12px; line-height:1.5; margin:22px 0 90px }
  .gdofoot b{ color:#777 }
</style></head>

<script>
  var $=function(s){return document.querySelector(s)}, app=$('#app');
  function money(n){ return '$ '+Number(n||0).toLocaleString('es-AR') }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]}) }
  function toast(t){ var e=$('#toast'); e.textContent=t; e.classList.add('show'); setTimeout(function(){e.classList.remove('show')},1400) }

  // ====== CONFIGURACION (vendrá de la hoja CONFIGURACION del Sheet) ======
  var CFG = {
    minPedido: 50000, envioGratis: true, envioGratisDesde: 75000,
    horario: '10 a 14 hs',
    formasPago: ['Efectivo','Transferencia','QR'],
    sucursal: 'Acuña 1334, Villa Tesei',
    zonas: [
      { nombre:'Hurlingham, Morris, Barrio Altos de Podestá', costo:10000, dias:['Lunes'] },
      { nombre:'Palomar, Ciudad Jardín',                      costo:10000, dias:['Martes'] },
      { nombre:'Ramos Mejía, Haedo, Villa Sarmiento, Ciudadela', costo:10000, dias:['Miércoles'] },
      { nombre:'Castelar, Ituzaingó, Morón',                  costo:10000, dias:['Jueves','Viernes'] },
      { nombre:'Villa Tesei',                                 costo:7000,  dias:['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'] }
    ]
  };

  // ====== Escala por kg (igual que la mayorista) ======
  // En la hoja, las filas "N kg" guardan el PRECIO POR KG de ese escalón.
  // Ej: 1 kg=7500/kg, 2 kg=7000/kg, 5 kg=6500/kg. Si TODAS las variedades de un
  // producto son "N kg" → se vende POR KG (selector + precio automático).
  function parseKg(s){ var m=String(s||'').trim().match(/^(\d+(?:[.,]\d+)?)\s*kg$/i); return m?parseFloat(m[1].replace(',','.')):null; }
  function esPorPeso(p){ return p.vars.length>0 && p.vars.every(function(v){ return parseKg(v.variedad)!==null; }); }
  function tiersDe(p){ return p.vars.map(function(v){ return {min:parseKg(v.variedad), perkg:v.precio}; }).sort(function(a,b){return a.min-b.min;}); }
  function perkg(tiers, kg){ var t=tiers[0]; for(var i=0;i<tiers.length;i++){ if(kg>=tiers[i].min) t=tiers[i]; } return t.perkg; }

  // ====== Carrito. Dos tipos de línea ======
  //  'peso': producto por kg {tipo,nombre,tiers,kg}  ·  'var': variedad suelta {tipo,nombre,variedad,precio,cant}
  var CART = {}, TIERMAP = {};
  function pkey(n){ return 'P|'+n; }
  function vkey(n,v){ return 'V|'+n+'||'+v; }
  function lineTotal(it){ return it.tipo==='peso' ? perkg(it.tiers,it.kg)*it.kg : it.precio*it.cant; }
  function cartTotal(){ var s=0; for(var k in CART) s+=lineTotal(CART[k]); return s; }
  function cartCount(){ return Object.keys(CART).length; }
  function pesoKg(n){ var it=CART[pkey(n)]; return it?it.kg:0; }
  function qtyOf(n,v){ var it=CART[vkey(n,v)]; return it?it.cant:0; }
  function setPeso(nombre, tiers, delta){
    var k=pkey(nombre), it=CART[k]||{tipo:'peso',nombre:nombre,tiers:tiers,kg:0};
    it.kg=Math.max(0,it.kg+delta); it.tiers=tiers;
    if(it.kg===0) delete CART[k]; else CART[k]=it;
    sync(); drawCart();
  }
  function setVar(nombre, variedad, precio, delta){
    var k=vkey(nombre,variedad), it=CART[k]||{tipo:'var',nombre:nombre,variedad:variedad,precio:precio,cant:0};
    it.cant+=delta; it.precio=precio;
    if(it.cant<=0) delete CART[k]; else CART[k]=it;
    sync(); drawCart();
  }
  function delLine(k){ delete CART[k]; sync(); drawCart(); }
  function refreshSteppers(){
    document.querySelectorAll('[data-q]').forEach(function(s){ var p=s.dataset.q.split('||'),q=qtyOf(p[0],p[1]); s.textContent=q; var r=s.closest('.var'); if(r) r.classList.toggle('incart',q>0); });
    document.querySelectorAll('[data-qk]').forEach(function(s){ s.textContent=pesoKg(s.dataset.qk); });
    document.querySelectorAll('[data-tot]').forEach(function(s){ var it=CART[pkey(s.dataset.tot)]; s.textContent = it ? money(lineTotal(it)) : ''; });
    document.querySelectorAll('[data-pk]').forEach(function(r){ r.classList.toggle('incart', pesoKg(r.dataset.pk)>0); });
  }
  function sync(){
    var tot=cartTotal(), n=cartCount(), falta=Math.max(0,CFG.minPedido-tot);
    var faltaEnvio = CFG.envioGratis ? Math.max(0, CFG.envioGratisDesde-tot) : 0;
    var sub;
    if(falta>0) sub='faltan '+money(falta)+' (mínimo '+money(CFG.minPedido)+')';
    else if(CFG.envioGratis && tot>=CFG.envioGratisDesde) sub='🎉 ¡AHORA TU ENVÍO ES GRATIS!';
    else if(CFG.envioGratis && faltaEnvio>0) sub='✓ podés pedir · faltan '+money(faltaEnvio)+' para envío gratis';
    else sub='✓ podés hacer el pedido';
    $('#cbTot').textContent=money(tot);
    var bm=$('#cbMin'); bm.textContent = n+' producto'+(n===1?'':'s')+' · '+sub;
    bm.classList.toggle('free', CFG.envioGratis && falta<=0 && tot>=CFG.envioGratisDesde);
    if(n) $('#cartbar').classList.add('show'); else { $('#cartbar').classList.remove('show'); cerrarCart(); }
    refreshSteppers();
  }

  // ====== Registrar pedido de ENVÍO en el panel de Rutas (Firestore) ======
  // Las reglas exigen origen=='tienda', estado=='pendiente', rutaId/creadoPor null,
  // cliente/telefono/direccion/especificaciones strings, items lista 1-100, historia
  // vacía. Campos extra (zona, diaEntrega, etc.) están permitidos. La tienda entra
  // anónima (puede CREAR, no editar). Escribimos YA (persistencia offline) por si el
  // cliente salta a WhatsApp y la página se descarga.
  function nid(){ try{ if(window.crypto&&crypto.getRandomValues){ var a=new Uint8Array(16); crypto.getRandomValues(a); var s=''; for(var i=0;i<a.length;i++){ s+=('0'+a[i].toString(36)).slice(-2); } return 'p_'+s; } }catch(e){} return 'p_'+Date.now().toString(36)+Math.random().toString(36).slice(2,12); }
  var MIN_INBOX='gdo_reparto_inbox';
  function registrarPedidoEnvio(d){
    var items=[];
    for(var k in CART){ var it=CART[k];
      if(it.tipo==='peso') items.push({ producto: it.nombre, cantidad: it.kg, unidad:'kg', nota:'' });
      else items.push({ producto: it.nombre+' ('+it.variedad+')', cantidad: it.cant, unidad:'u', nota:'' });
    }
    if(!items.length) return;
    var esp=['MINORISTA','Zona: '+d.zona,'Día de entrega: '+d.dia,'Envío: '+(d.env===0?'sin cargo':money(d.env)),'TOTAL a cobrar: '+money(d.sub+d.env)];
    if(d.notas) esp.push('Notas: '+d.notas);
    var pedido={
      id:nid(), origen:'tienda', lista:'minorista', cliente:d.nom, telefono:d.tel,
      direccion:d.addr, localidad:d.loc||'', entrecalles:d.entre||'', lat:null, lng:null,
      items:items, fechaEntrega:'', especificaciones:esp.join(' · '),
      formaPago:d.pago||'', prioridad:'normal', estado:'pendiente', creadoPor:null, rutaId:null,
      clienteUid:null, totalEstimado: Math.round(d.sub),
      zona:d.zona, diaEntrega:d.dia, envio:Math.round(d.env),
      ventana:'', historia:[], ts:Date.now()
    };
    try{ var inb=JSON.parse(localStorage.getItem(MIN_INBOX)||'[]'); if(!Array.isArray(inb)) inb=[]; inb.push(pedido); localStorage.setItem(MIN_INBOX, JSON.stringify(inb)); }catch(e){}
    function drop(){ try{ var inb=JSON.parse(localStorage.getItem(MIN_INBOX)||'[]'); if(Array.isArray(inb)) localStorage.setItem(MIN_INBOX, JSON.stringify(inb.filter(function(x){return x&&x.id!==pedido.id;}))); }catch(e){} }
    function write(){ try{ return GDO.FB.db.collection('pedidos').doc(pedido.id).set(pedido); }catch(e){ return Promise.reject(e); } }
    if(window.GDO&&GDO.FB&&GDO.FB.enabled&&GDO.FB.db){ write().then(function(){drop();console.log('E2E_WRITE ok');}).catch(function(e){console.log('E2E_WRITE err '+(e&&e.code));}); }
    else if(window.GDO&&GDO.FB&&GDO.FB.ready){ GDO.FB.ready.then(function(en){ if(en&&GDO.FB.db) return write().then(function(){drop();console.log('E2E_WRITE ok2');}); }).catch(function(e){console.log('E2E_WRITE err2 '+(e&&e.code));}); }
  }

  // ---------- chooser ----------
  // La pantalla de elección Mayorista/Minorista vive en index.html (entrada única).
  // Acá "volver" siempre regresa a esa pantalla.
  function chooser(){ location.href='index.html'; }

  // ---------- agrupar ----------
  function group(items){
    var cats=[], cm={};
    items.forEach(function(it){
      var c=cm[it.cat]; if(!c){c={name:it.cat,subs:[],sm:{}};cm[it.cat]=c;cats.push(c)}
      var s=c.sm[it.sub]; if(!s){s={name:it.sub,prods:[],pm:{}};c.sm[it.sub]=s;c.subs.push(s)}
      var p=s.pm[it.nombre]; if(!p){p={nombre:it.nombre,desc:it.desc,vars:[]};s.pm[it.nombre]=p;s.prods.push(p)}
      p.vars.push(it);
    });
    return cats;
  }

    $('#back').style.display='block'; $('#htitle').textContent='Lista Minorista'; $('#hsub').textContent='Precios al público';

    render(cats);
    startBanner();
    $('#q').oninput=function(){
      var t=this.value.trim().toLowerCase();
      if(!t){ render(cats); return; }
      var f=(window.MIN_DATA||[]).filter(function(it){ return (it.nombre+' '+it.sub+' '+it.cat+' '+it.variedad).toLowerCase().indexOf(t)>=0 });
      render(group(f), true);
    };
  }

  // carrusel del banner (rotación automática + puntitos para tocar)
  function startBanner(){
    var track=$('#bnt'), dots=$('#bnd'); if(!track||!dots) return;
    var n=track.children.length, i=0;
    function go(x){ i=(x+n)%n; track.style.transform='translateX(-'+(i*100)+'%)';
      Array.prototype.forEach.call(dots.children,function(c,ci){ c.className=ci===i?'on':'' }); }
    for(var k=0;k<n;k++){ var d=document.createElement('i'); (function(idx){ d.onclick=function(){ go(idx) } })(k); dots.appendChild(d); }
    go(0);
    setInterval(function(){ go(i+1) }, 4500);
  }

  function render(cats, openAll){
    var acc=$('#acc'); TIERMAP={};
    acc.innerHTML = cats.map(function(c){
      var inner = c.subs.map(function(s){
        var prods = s.prods.map(function(p){
          var multi = p.vars.length>1, body, etq, val;
          if(esPorPeso(p)){
            var tiers=tiersDe(p); TIERMAP[p.nombre]=tiers; var nA=esc(p.nombre);
            var nt=tiers.length, orden=tiers.slice().sort(function(a,b){return a.perkg-b.perkg;}), rank={};
            orden.forEach(function(t,i){ rank[t.min]=i; });
            var tabla='<div class="tiers">'+tiers.map(function(t){
              var cls = nt>1 ? (rank[t.min]===0?' of2':(rank[t.min]===1?' of1':'')) : '';
              var bdg = (nt>1 && rank[t.min]===0) ? '<span class="ofb">★ MÁS CONVENIENTE</span>' : '';
              return '<div class="tr'+cls+'">'+bdg+'<span class="tk">'+t.min+' kg</span><b>'+money(t.min*t.perkg)+'</b><small>'+money(t.perkg)+'/kg</small></div>';
            }).join('')+'</div>';
            body='<div class="kgsel" data-pk="'+nA+'">'+tabla+
              '<div class="kgrow"><span class="lbl">¿Cuántos kg?</span>'+
                '<span class="stp"><button class="pdec" data-n="'+nA+'">−</button>'+
                  '<span class="qn" data-qk="'+nA+'">'+pesoKg(p.nombre)+'</span>'+
                  '<button class="pinc" data-n="'+nA+'">+</button></span><span class="lbl">kg</span>'+
                '<span class="ktot" data-tot="'+nA+'"></span></div></div>';
            etq='DESDE'; val=money(tiers[0].min*tiers[0].perkg);
          } else {
            var hayCaja = p.vars.length>1 && p.vars.some(function(v){ return /caja/i.test(v.variedad||''); });
            body='<div class="vars">'+ p.vars.map(function(v){
              var nA=esc(p.nombre), vA=esc(v.variedad||'Unidad');
              var esCaja = hayCaja && /caja/i.test(v.variedad||'');
              var bdg = esCaja ? '<span class="ofb">★ MÁS CONVENIENTE</span>' : '';
              return '<div class="var'+(esCaja?' of2':'')+'">'+bdg+'<span class="vn">'+esc(v.variedad||'Unidad')+'</span>'+
                '<span class="vp">'+(v.precioAnt?'<span class="ant">'+money(v.precioAnt)+'</span>':'')+money(v.precio)+'</span>'+
                '<span class="stp"><button class="sdec" data-n="'+nA+'" data-v="'+vA+'" data-p="'+v.precio+'">−</button>'+
                  '<span class="qn" data-q="'+esc(p.nombre+'||'+(v.variedad||'Unidad'))+'">'+qtyOf(p.nombre,v.variedad||'Unidad')+'</span>'+
                  '<button class="sinc" data-n="'+nA+'" data-v="'+vA+'" data-p="'+v.precio+'">+</button></span></div>';
            }).join('')+'</div>';
            var min=Math.min.apply(null,p.vars.map(function(v){return v.precio})); etq=(multi?'DESDE':'PRECIO'); val=money(min);
          }
          return '<div class="prod"><button class="prod-h"><div class="pi"><b>'+esc(p.nombre)+'</b>'+(p.desc?'<span>'+esc(p.desc)+'</span>':'')+'</div>'+
            '<div class="desde"><small>'+etq+'</small><b>'+val+'</b></div><span class="chev">›</span></button>'+
            body+'</div>';
        }).join('');
        return '<div class="sub'+(openAll?' open':'')+'"><button class="sub-h">'+esc(s.name)+'<span class="n">'+s.prods.length+'</span><span class="chev">›</span></button><div class="sub-body">'+prods+'</div></div>';
      }).join('');
      return '<div class="cat'+(openAll?' open':'')+'"><button class="cat-h">'+esc(c.name)+'<span class="n">'+c.subs.reduce(function(a,s){return a+s.prods.length},0)+'</span><span class="chev">›</span></button><div class="cat-body">'+inner+'</div></div>';
    }).join('');
    // abrir/cerrar cada nivel
    acc.querySelectorAll('.cat-h').forEach(function(b){ b.onclick=function(){ b.parentElement.classList.toggle('open') } });
    acc.querySelectorAll('.sub-h').forEach(function(b){ b.onclick=function(){ b.parentElement.classList.toggle('open') } });
    acc.querySelectorAll('.prod-h').forEach(function(b){ b.onclick=function(){ b.parentElement.classList.toggle('open') } });
    // por kg: +/− que calcula el precio del escalón automáticamente
    acc.querySelectorAll('.pinc').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); setPeso(b.dataset.n, TIERMAP[b.dataset.n], 1); }; });
    acc.querySelectorAll('.pdec').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); setPeso(b.dataset.n, TIERMAP[b.dataset.n], -1); }; });
    // variedades sueltas: +/− por unidad
    acc.querySelectorAll('.sinc').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); setVar(b.dataset.n, b.dataset.v, +b.dataset.p, 1); }; });
    acc.querySelectorAll('.sdec').forEach(function(b){ b.onclick=function(e){ e.stopPropagation(); setVar(b.dataset.n, b.dataset.v, +b.dataset.p, -1); }; });
    refreshSteppers();
  }

  function boot(){
    $('#cbBtn').onclick=verCart;
    $('#back').onclick=function(){ location.href='index.html'; };
    lista();
    if(location.search.indexOf('e2e')>=0){ setTimeout(e2eRun,1500); }
  }
  function e2eRun(){
    // esperar a que el login anónimo esté listo (como un cliente real que tarda en el form)
    var waited=0, t=setInterval(function(){
      var ok = window.GDO&&GDO.FB&&GDO.FB.auth&&GDO.FB.auth.currentUser;
      waited+=300;
      if(ok || waited>=6000){ clearInterval(t); console.log('E2E_AUTH user='+(!!ok)); e2eDrive(); }
    },300);
  }
  function e2eDrive(){
    window.open=function(){};
    setPeso('PRUEBA (borrar)',[{min:1,perkg:7500}],8);
    checkout();
    var z=document.getElementById('ckZona'); var idx=-1;
    for(var i=0;i<CFG.zonas.length;i++){ if(CFG.zonas[i].dias&&CFG.zonas[i].dias.length){ idx=i; break; } }
    z.value=String(idx); z.onchange();
    var dd=document.querySelector('.diab'); if(dd) dd.click();
    document.getElementById('ckDir').value='PRUEBA Bombero Celiz 1200';
    document.getElementById('ckNom').value='PRUEBA (borrar)';
    document.getElementById('ckTel').value='11 0000-0000';
    document.getElementById('ckSend').click();
    setTimeout(function(){
      var inb=[]; try{ inb=JSON.parse(localStorage.getItem('gdo_reparto_inbox')||'[]'); }catch(e){}
      console.log('E2E_RESULT fb='+(window.GDO&&GDO.FB&&GDO.FB.enabled)+' inboxPend='+inb.length);
      if(inb.length && GDO.FB.db){
        var id=inb[inb.length-1].id;
        GDO.FB.db.collection('pedidos').doc(id).get()
          .then(function(s){ console.log('E2E_GET exists='+s.exists+' fromCache='+(s.metadata&&s.metadata.fromCache)); })
          .catch(function(e){ console.log('E2E_GET err '+(e&&e.code)); });
      }
    },9000);
  }
  // Datos EN VIVO desde la hoja (mismo Apps Script que la mayorista, ?lista=minorista):
  // devuelve { productos:[...], config:{...} }. Sin internet NO se muestran precios.
  (function(){
    var API='https://script.google.com/macros/s/AKfycbwH6JW35BRYcBk958OEr4sEvfVIfzgqzQeGwvz63xZYgukwxik8EsIego4d9O456bHURg/exec';
    fetch(API+'?lista=minorista')
      .then(function(r){ return r.json(); })
      .then(function(d){
        window.MIN_DATA = (d && d.productos) ? d.productos : [];
        if(d && d.config){ CFG = d.config; }
        boot();
      })
      .catch(function(){
        app.innerHTML='<div class="lead" style="margin-top:40px">No se pudo cargar la lista. Revisá tu conexión y recargá.</div>';
      });
  })();
</script>
</body></html>
